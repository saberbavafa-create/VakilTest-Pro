
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دادآزمون</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    font-family:Tahoma, Arial;
    background:#eef1f8;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:400px;
    background:white;
    border-radius:25px;
    padding:25px 20px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

.logo{
    font-size:50px;
}

h1{
    margin:5px;
    color:#17227a;
    font-size:28px;
}

.subtitle{
    color:#555;
    font-size:17px;
    margin-bottom:20px;
}


.main-btn{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:15px;
    background:#17227a;
    color:white;
    font-size:19px;
}


.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}


.menu button{
    padding:14px 5px;
    border:none;
    border-radius:14px;
    background:#e8eaf6;
    color:#17227a;
    font-size:16px;
}


.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}


</style>

</head>


<body>

<div class="container">

<div class="card">

<div class="logo">⚖️</div>

<h1>دادآزمون</h1>

<div class="subtitle">
شبیه‌ساز آزمون وکالت
</div>


<button class="main-btn">
شروع آزمون
</button>


<div class="menu">

<button>
آزمون‌های گذشته
</button>

<button>
کارنامه من
</button>

<button>
عضویت / ورود
</button>

<button>
تنظیمات
</button>

</div>


<div class="footer">
نسخه اول شبیه‌ساز وکالت
</div>


</div>

</div>


</body>
</html>
